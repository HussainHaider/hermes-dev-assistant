models:
  openai:
    provider: openai
    model: gpt-4o-mini
    api_key: ${OPENAI_API_KEY}
    max_tokens: 1024
    temperature: 0.7

  qwen:
    provider: openai  # OpenRouter uses OpenAI-compatible API
    model: qwen/qwen-2.5-72b-instruct
    api_key: ${QWEN_API_KEY}
    base_url: ${QWEN_BASE_URL}
    max_tokens: 1024
    temperature: 0.7

default: ${DEFAULT_MODEL}
